# =============================================================================
# promtail-config.yml — ship every container's logs to Loki.
#
# docker_sd_configs discovers containers through the Docker socket and reads
# their logs over the Docker API — no log-file mounts needed. Relabeling turns
# the compose service name into the `service` label (SAME label key the
# metrics use → Grafana can jump metrics <-> logs on one label).
#
# The pipeline parses the pino JSON line to promote `level` to a label.
# Levels are pino numerics (30=info, 40=warn, 50=error) — bounded cardinality.
# =============================================================================
server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
    pipeline_stages:
      - json:
          expressions:
            level: level
            msg: msg
      - labels:
          level:
