# =============================================================================
# ci.yml — Phase 6 pipeline: lint → build/test → image scan → smoke → push.
#
# Pipeline shape (the WHY of each stage is in docs/CONCEPTS.md #15):
#
#   hadolint ─┐
#             ├─→ image-build-scan (matrix ×8, Trivy gate) ─┐
#   build-test┘                                             ├─→ push-images
#                              compose-smoke (full stack) ──┘   (main only)
#
#   - build-test:      npm ci + tsc per service (matrix). Fast feedback tier.
#   - hadolint:        Dockerfile lint — catches container antipatterns early.
#   - image-build-scan: real image build per service + Trivy CVE gate
#                       (CRITICAL/HIGH, unfixed CVEs don't block — see docs).
#   - compose-smoke:   the ENTIRE platform booted in CI, then the saga is
#                       driven end-to-end (all three terminal paths). This is
#                       the stage that catches integration breaks no unit
#                       test can see.
#   - push-images:     only on main, only after everything is green → GHCR,
#                       tagged with the immutable commit SHA + latest.
# =============================================================================
name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SERVICES: gateway auth catalog cart order payment inventory notification

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        service: [gateway, auth, catalog, cart, order, payment, inventory, notification]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json
      - name: Install (reproducible — lockfile-exact)
        working-directory: services/${{ matrix.service }}
        run: npm ci
      - name: Type-check & build
        working-directory: services/${{ matrix.service }}
        run: npm run build

  hadolint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Lint every Dockerfile
        run: |
          set -euo pipefail
          for f in services/*/Dockerfile; do
            echo "::group::$f"
            docker run --rm -i hadolint/hadolint:v2.12.0 hadolint --failure-threshold error - < "$f"
            echo "::endgroup::"
          done

  image-build-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build-test, hadolint]
    strategy:
      fail-fast: false
      matrix:
        service: [gateway, auth, catalog, cart, order, payment, inventory, notification]
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t local/${{ matrix.service }}:ci services/${{ matrix.service }}
      - name: Trivy scan (gate on fixable CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: local/${{ matrix.service }}:ci
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'

  compose-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build-test, hadolint]
    steps:
      - uses: actions/checkout@v4
      - name: Generate local secrets & certs
        run: |
          bash scripts/generate-secrets.sh
          bash scripts/generate-certs.sh
      - name: Resolve api.localhost to loopback
        run: echo "127.0.0.1 api.localhost" | sudo tee -a /etc/hosts
      - name: Boot the full platform
        run: docker compose -f docker-compose.yml -f docker-compose.data.yml -f docker-compose.override.yml up -d --build --quiet-pull
      - name: Wait for all containers healthy
        run: bash scripts/wait-healthy.sh
      - name: End-to-end saga smoke (all three terminal paths)
        run: bash scripts/smoke-ci.sh
      - name: Dump logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml -f docker-compose.data.yml -f docker-compose.override.yml logs --tail=100
      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.data.yml -f docker-compose.override.yml down -v

  push-images:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [image-build-scan, compose-smoke]
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [gateway, auth, catalog, cart, order, payment, inventory, notification]
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push (immutable SHA tag + latest)
        run: |
          set -euo pipefail
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"   # GHCR requires lowercase
          IMG="ghcr.io/${OWNER}/ecommerce-${{ matrix.service }}"
          docker build -t "${IMG}:${GITHUB_SHA}" -t "${IMG}:latest" services/${{ matrix.service }}
          docker push "${IMG}:${GITHUB_SHA}"
          docker push "${IMG}:latest"
