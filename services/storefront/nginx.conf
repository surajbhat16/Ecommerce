# Serve the SPA on :8080. All non-file routes fall back to index.html so the
# client-side router can handle them. API calls (/api/*) are NOT handled here —
# Traefik routes those to the gateway before they'd ever reach this container.
server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Long-cache the fingerprinted assets Vite emits.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # SPA fallback.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
